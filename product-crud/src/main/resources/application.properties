# Defaults target a local Postgres on localhost:5432.
# In docker-compose these are overridden via SPRING_DATASOURCE_* env vars (see docker-compose.yml).
spring.datasource.url=jdbc:postgresql://localhost:5432/crud_demo
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
